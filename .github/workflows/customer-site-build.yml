name: Customer site build

# Triggered by the ops worker (Stage 2C C5.4) via repository_dispatch
# when a customer hits "Request site preview" on the Hub. Pulls the
# prospect's intake data from Notion, runs `next build` on the
# customer-site-template, and deploys the bundle to the customer's
# per-customer Cloudflare Worker (replaces the placeholder uploaded
# in C2.3).
#
# Reports back to /api/internal/build-callback with success +
# previewUrl, OR failure + errorMessage. Either outcome clears the
# Preview Build Triggered At latch in Notion so the next preview
# request can re-trigger.

on:
  repository_dispatch:
    types: [customer-site-build]

  # Manual run for ops debugging — pass token via the workflow_dispatch
  # input. Useful if you want to re-trigger a build without going
  # through the cron path.
  workflow_dispatch:
    inputs:
      token:
        description: "Prospect token (UUID)"
        required: true
        type: string
      mode:
        description: "live = wrangler deploy (replaces production); preview = wrangler versions upload (issues a preview URL, customer approves to promote)"
        required: false
        type: choice
        default: "live"
        options:
          - live
          - preview
      changeRequestId:
        description: "Optional — when mode=preview, the change-request id this build is for. Threaded back to the callback so the marketing site stamps the preview URL on the right request."
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Marketing-site URL the Action calls for /api/internal/* endpoints.
      # Set this as a GitHub repo secret. Default is production.
      MARKETING_SITE_BASE: ${{ secrets.MARKETING_SITE_BASE || 'https://modu-forge.co.uk' }}
      # Shared secret matching INTERNAL_BUILD_SECRET on the marketing site.
      INTERNAL_SECRET: ${{ secrets.INTERNAL_BUILD_SECRET }}
      # Customer Cloudflare API token — same user-scoped token the
      # ops worker uses. Wrangler reads this as CLOUDFLARE_API_TOKEN.
      CLOUDFLARE_API_TOKEN: ${{ secrets.BEN_CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve token + mode + changeRequestId + reviewEditId + previewAccessToken
        id: token
        run: |
          TOKEN="${{ github.event.client_payload.token || inputs.token }}"
          if [ -z "$TOKEN" ]; then
            echo "::error::No prospect token in either dispatch payload or manual input"
            exit 1
          fi
          # Mode: dispatch payload first, then manual input, default "live".
          MODE="${{ github.event.client_payload.mode || inputs.mode || 'live' }}"
          if [ "$MODE" != "live" ] && [ "$MODE" != "preview" ]; then
            echo "::error::mode must be 'live' or 'preview' (got '$MODE')"
            exit 1
          fi
          # Change request id only relevant for preview builds (post-
          # commit auto-apply path). Review edit id only relevant for
          # live builds dispatched as part of pre-commit auto-apply.
          # The callback uses each to stamp the right entry in Notion.
          CR_ID="${{ github.event.client_payload.changeRequestId || inputs.changeRequestId }}"
          RE_ID="${{ github.event.client_payload.reviewEditId }}"
          # Preview-access token (NEW C5.7 preview-gate) — passed
          # via wrangler `--var PREVIEW_ACCESS_TOKEN=...` on
          # `versions upload` so the customer-site middleware can
          # gate access by checking the cookie / query param.
          PREVIEW_TOKEN="${{ github.event.client_payload.previewAccessToken }}"
          echo "value=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "change_request_id=$CR_ID" >> "$GITHUB_OUTPUT"
          echo "review_edit_id=$RE_ID" >> "$GITHUB_OUTPUT"
          echo "preview_access_token=$PREVIEW_TOKEN" >> "$GITHUB_OUTPUT"
          echo "Building site for token: $TOKEN (mode=$MODE${CR_ID:+, cr=$CR_ID}${RE_ID:+, re=$RE_ID})"

      - name: Fetch site data + deploy metadata from marketing site
        id: fetch
        run: |
          set -e
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -H "x-internal-secret: ${INTERNAL_SECRET}" \
            "${MARKETING_SITE_BASE}/api/internal/site-data?token=${{ steps.token.outputs.value }}")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          if [ "$STATUS" -ne 200 ]; then
            echo "::error::site-data fetch failed (HTTP $STATUS)"
            echo "$BODY"
            echo "$BODY" | jq -r '.error // "unknown error"' > /tmp/build-error.txt
            exit 1
          fi
          # Stash the deploy metadata (account id + worker name) +
          # write site-data for the build.
          ACCOUNT_ID=$(echo "$BODY" | jq -r '.deploy.cloudflareAccountId // empty')
          WORKER_NAME=$(echo "$BODY" | jq -r '.deploy.workerName // empty')
          DOMAIN=$(echo "$BODY" | jq -r '.siteData.domain // empty')
          if [ -z "$ACCOUNT_ID" ] || [ -z "$WORKER_NAME" ]; then
            echo "::error::Missing deploy metadata (accountId=$ACCOUNT_ID, workerName=$WORKER_NAME)"
            exit 1
          fi
          echo "$BODY" | jq '.siteData' > customer-site-template/src/data/site-data.json
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "worker_name=$WORKER_NAME" >> "$GITHUB_OUTPUT"
          echo "preview_url=https://${DOMAIN}/" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy target: account=$ACCOUNT_ID worker=$WORKER_NAME"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: customer-site-template/package-lock.json

      - name: Install + build customer-site-template
        working-directory: customer-site-template
        run: |
          npm ci
          npm run build

      - name: Deploy LIVE (wrangler deploy)
        if: steps.token.outputs.mode == 'live'
        working-directory: customer-site-template
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.fetch.outputs.account_id }}
        run: |
          npx wrangler deploy --name "${{ steps.fetch.outputs.worker_name }}"

      - name: Upload PREVIEW version (wrangler versions upload)
        id: preview_upload
        if: steps.token.outputs.mode == 'preview'
        working-directory: customer-site-template
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.fetch.outputs.account_id }}
        run: |
          set -e
          # Upload-without-deploy. Cloudflare returns a version id +
          # a unique preview URL per upload. We capture both and
          # forward to the callback so the customer can be emailed
          # the URL + the marketing-site can later promote the
          # version via the customer-site-promote workflow.
          # The --var PREVIEW_ACCESS_TOKEN is set on this version
          # ONLY (live deploys don't pass it) — the customer-site
          # middleware checks for it and gates access. Without it
          # set, anyone with the workers.dev URL would get our
          # "preview locked" page.
          PREVIEW_VAR_ARGS=""
          if [ -n "${{ steps.token.outputs.preview_access_token }}" ]; then
            PREVIEW_VAR_ARGS="--var PREVIEW_ACCESS_TOKEN:${{ steps.token.outputs.preview_access_token }}"
          fi
          OUT=$(npx wrangler versions upload --name "${{ steps.fetch.outputs.worker_name }}" $PREVIEW_VAR_ARGS 2>&1 | tee /dev/stderr)
          # Wrangler prints a line like: "Worker Version ID: <uuid>"
          # and a separate line containing the preview URL like
          # "<id>.<account-subdomain>.workers.dev". Extract both.
          VERSION_ID=$(printf "%s" "$OUT" | grep -Eo '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          # Cloudflare's version preview URL pattern (covers both
          # workers.dev subdomain shapes that ship today).
          PREVIEW_VERSION_URL=$(printf "%s" "$OUT" | grep -Eo 'https://[a-z0-9-]+(\.[a-z0-9-]+)*\.workers\.dev' | head -1)
          if [ -z "$VERSION_ID" ] || [ -z "$PREVIEW_VERSION_URL" ]; then
            echo "::error::Couldn't extract version id / preview URL from wrangler output"
            echo "$OUT"
            exit 1
          fi
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"
          echo "preview_version_url=$PREVIEW_VERSION_URL" >> "$GITHUB_OUTPUT"
          echo "Preview version uploaded: $VERSION_ID @ $PREVIEW_VERSION_URL"

      - name: Notify marketing site of success
        if: success()
        run: |
          # Live builds report the live URL; preview builds report
          # the version-specific preview URL + version id so the
          # customer can be emailed it + the marketing site can
          # later trigger a promote.
          if [ "${{ steps.token.outputs.mode }}" = "preview" ]; then
            PAYLOAD=$(jq -nc \
              --arg token "${{ steps.token.outputs.value }}" \
              --arg url "${{ steps.preview_upload.outputs.preview_version_url }}" \
              --arg vid "${{ steps.preview_upload.outputs.version_id }}" \
              --arg crid "${{ steps.token.outputs.change_request_id }}" \
              --arg pat "${{ steps.token.outputs.preview_access_token }}" \
              '{token: $token, status: "success", mode: "preview", previewUrl: $url, previewVersionId: $vid, changeRequestId: $crid, previewAccessToken: $pat}')
          else
            # live mode — include reviewEditId if this is a pre-commit
            # auto-apply build so the callback can email the customer
            # the right "your edit is applied" template.
            PAYLOAD=$(jq -nc \
              --arg token "${{ steps.token.outputs.value }}" \
              --arg url "${{ steps.fetch.outputs.preview_url }}" \
              --arg reid "${{ steps.token.outputs.review_edit_id }}" \
              '{token: $token, status: "success", mode: "live", previewUrl: $url, reviewEditId: $reid}')
          fi
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${INTERNAL_SECRET}" \
            -d "$PAYLOAD" \
            "${MARKETING_SITE_BASE}/api/internal/build-callback"

      - name: Notify marketing site of failure
        if: failure()
        run: |
          ERROR_MSG="$(cat /tmp/build-error.txt 2>/dev/null || echo 'Build job failed — check Action logs')"
          # Truncate to fit the 2000-char schema cap, just in case
          # `cat` returns a giant log dump.
          ERROR_MSG="${ERROR_MSG:0:1900}"
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${INTERNAL_SECRET}" \
            -d "$(jq -nc \
                --arg token "${{ steps.token.outputs.value }}" \
                --arg msg "$ERROR_MSG" \
                --arg mode "${{ steps.token.outputs.mode }}" \
                --arg crid "${{ steps.token.outputs.change_request_id }}" \
                --arg reid "${{ steps.token.outputs.review_edit_id }}" \
                '{token: $token, status: "failure", mode: $mode, changeRequestId: $crid, reviewEditId: $reid, errorMessage: $msg}')" \
            "${MARKETING_SITE_BASE}/api/internal/build-callback" || true
